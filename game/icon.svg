<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#2a2014"/>
      <stop offset="60%" stop-color="#181009"/>
      <stop offset="100%" stop-color="#0c0805"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb43c" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffb43c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- converging lanes -->
  <g stroke="#7a4a2d" stroke-width="6" fill="none" opacity="0.8">
    <path d="M256 215 L120 512"/>
    <path d="M256 215 L256 512"/>
    <path d="M256 215 L392 512"/>
  </g>
  <!-- horizon haze -->
  <rect x="0" y="205" width="512" height="20" fill="#b85a2a" opacity="0.25"/>
  <!-- crosshair glow -->
  <circle cx="256" cy="240" r="150" fill="url(#glow)"/>
  <!-- crosshair -->
  <g stroke="#ffb43c" stroke-width="18" fill="none" stroke-linecap="round">
    <circle cx="256" cy="240" r="78"/>
    <line x1="256" y1="120" x2="256" y2="190"/>
    <line x1="256" y1="290" x2="256" y2="360"/>
    <line x1="136" y1="240" x2="206" y2="240"/>
    <line x1="306" y1="240" x2="376" y2="240"/>
  </g>
  <circle cx="256" cy="240" r="14" fill="#ffb43c"/>
</svg>
